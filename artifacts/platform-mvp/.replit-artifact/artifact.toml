kind = "web"
previewPath = "/"
title = "Platform MVP"
version = "1.0.0"
id = "artifacts/platform-mvp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25934

[services.development]
run = "pnpm --filter @workspace/platform-mvp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/platform-mvp", "run", "build" ]
publicDir = "artifacts/platform-mvp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25934"
BASE_PATH = "/"
